<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="930" viewBox="0 0 1500 930">
  <title>Biểu đồ triển khai hệ thống</title>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#111"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #111; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 14px; }
      .small { font-size: 12px; }
      .tiny { font-size: 10px; }
      .boundary { fill: #fff; stroke: #111; stroke-width: 1.5; }
      .usecase { fill: #fff; stroke: #111; stroke-width: 1.3; }
      .actor { stroke: #111; stroke-width: 1.25; fill: none; }
      .line { stroke: #111; stroke-width: 1.15; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #111; stroke-width: 1; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
      .box { fill: #fff; stroke: #111; stroke-width: 1.25; }
      .soft { fill: #f7f7f7; stroke: #111; stroke-width: 1.1; }
      .decision { fill: #fff; stroke: #111; stroke-width: 1.25; }
      .class { fill: #fff; stroke: #111; stroke-width: 1.2; }
      .classHead { fill: #efefef; stroke: #111; stroke-width: 1.2; }
      .relation { stroke: #111; stroke-width: 1; fill: none; }
      .participant { fill: #fff; stroke: #111; stroke-width: 1.2; }
      .lifeline { stroke: #888; stroke-width: 1; stroke-dasharray: 6 5; }
      .note { fill: #fffbe6; stroke: #111; stroke-width: 1; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="750" y="34" text-anchor="middle" class="title">Biểu đồ triển khai hệ thống</text>
<text x="750" y="68" text-anchor="middle" class="small">Góc nhìn triển khai: client web, Next.js frontend, Express backend, MongoDB và các dịch vụ ngoài.</text>
<rect class="box" x="70" y="130" width="250" height="170" rx="6"/>
<text x="86" y="155" class="tiny">&lt;&lt;client device&gt;&gt;</text>
<text x="86" y="178" class="label">Thiết bị người dùng</text>
<rect class="soft" x="88" y="202" width="214" height="30" rx="4"/>
<text x="195" y="222" text-anchor="middle" class="tiny"><tspan x="195" y="222">Web browser</tspan></text>
<rect class="soft" x="88" y="244" width="214" height="30" rx="4"/>
<text x="195" y="264" text-anchor="middle" class="tiny"><tspan x="195" y="264">User / Student / Teacher / Admin</tspan></text>
<rect class="box" x="390" y="100" width="310" height="240" rx="6"/>
<text x="406" y="125" class="tiny">&lt;&lt;web server&gt;&gt;</text>
<text x="406" y="148" class="label">Frontend Next.js</text>
<rect class="soft" x="408" y="172" width="274" height="30" rx="4"/>
<text x="545" y="192" text-anchor="middle" class="tiny"><tspan x="545" y="192">App Router pages</tspan></text>
<rect class="soft" x="408" y="214" width="274" height="30" rx="4"/>
<text x="545" y="234" text-anchor="middle" class="tiny"><tspan x="545" y="234">Admin / Student / Public UI</tspan></text>
<rect class="soft" x="408" y="256" width="274" height="30" rx="4"/>
<text x="545" y="276" text-anchor="middle" class="tiny"><tspan x="545" y="276">API client + local storage</tspan></text>
<rect class="soft" x="408" y="298" width="274" height="30" rx="4"/>
<text x="545" y="318" text-anchor="middle" class="tiny"><tspan x="545" y="318">Static assets</tspan></text>
<rect class="box" x="770" y="100" width="350" height="320" rx="6"/>
<text x="786" y="125" class="tiny">&lt;&lt;application server&gt;&gt;</text>
<text x="786" y="148" class="label">Backend Node.js / Express</text>
<rect class="soft" x="788" y="172" width="314" height="30" rx="4"/>
<text x="945" y="192" text-anchor="middle" class="tiny"><tspan x="945" y="192">REST controllers</tspan></text>
<rect class="soft" x="788" y="214" width="314" height="30" rx="4"/>
<text x="945" y="234" text-anchor="middle" class="tiny"><tspan x="945" y="234">Auth + RBAC middleware</tspan></text>
<rect class="soft" x="788" y="256" width="314" height="30" rx="4"/>
<text x="945" y="276" text-anchor="middle" class="tiny"><tspan x="945" y="276">Domain services</tspan></text>
<rect class="soft" x="788" y="298" width="314" height="30" rx="4"/>
<text x="945" y="318" text-anchor="middle" class="tiny"><tspan x="945" y="318">Mongoose repositories</tspan></text>
<rect class="soft" x="788" y="340" width="314" height="30" rx="4"/>
<text x="945" y="360" text-anchor="middle" class="tiny"><tspan x="945" y="360">Upload middleware</tspan></text>
<path class="box" d="M1210 153 C1210 129, 1440 129, 1440 153 L1440 327 C1440 351, 1210 351, 1210 327 Z"/>
<ellipse class="box" cx="1325" cy="153" rx="115" ry="22"/>
<text x="1325" y="198" text-anchor="middle" class="small"><tspan x="1325" y="198">MongoDB</tspan></text>
<text x="1240" y="230" class="tiny">- Users, RBAC</text>
<text x="1240" y="250" class="tiny">- Courses, classes</text>
<text x="1240" y="270" class="tiny">- Payments, audits</text>
<rect class="box" x="390" y="535" width="310" height="150" rx="6"/>
<text x="406" y="560" class="tiny">&lt;&lt;file storage&gt;&gt;</text>
<text x="406" y="583" class="label">Backend uploads</text>
<rect class="soft" x="408" y="607" width="274" height="30" rx="4"/>
<text x="545" y="627" text-anchor="middle" class="tiny"><tspan x="545" y="627">avatars/</tspan></text>
<rect class="soft" x="408" y="649" width="274" height="30" rx="4"/>
<text x="545" y="669" text-anchor="middle" class="tiny"><tspan x="545" y="669">course/blog images fallback</tspan></text>
<rect class="soft" x="770" y="535" width="300" height="160" rx="18"/>
<text x="788" y="564" class="tiny">&lt;&lt;external service&gt;&gt;</text>
<text x="788" y="590" class="label">Cloudinary</text>
<text x="794" y="623" class="tiny">- Lưu ảnh đại diện</text>
<text x="794" y="644" class="tiny">- Lưu ảnh khóa học / bài viết</text>
<text x="794" y="665" class="tiny">- CDN phân phối ảnh</text>
<rect class="soft" x="1160" y="535" width="280" height="160" rx="18"/>
<text x="1178" y="564" class="tiny">&lt;&lt;external service&gt;&gt;</text>
<text x="1178" y="590" class="label">VNPay Gateway</text>
<text x="1184" y="623" class="tiny">- Tạo URL thanh toán</text>
<text x="1184" y="644" class="tiny">- Xử lý giao dịch</text>
<text x="1184" y="665" class="tiny">- Callback kết quả</text>
<path class="line" d="M320 215 L390 215"/><text x="355" y="210" text-anchor="middle" class="tiny">HTTPS</text>
<path class="line" d="M700 215 L770 215"/><text x="735" y="210" text-anchor="middle" class="tiny">REST/JSON + token</text>
<path class="line" d="M1120 220 L1210 220"/><text x="1165" y="215" text-anchor="middle" class="tiny">Mongoose/TCP</text>
<path class="line" d="M945 420 L910 535"/><text x="928" y="473" text-anchor="middle" class="tiny">Upload API</text>
<path class="line" d="M540 340 L540 535"/><text x="540" y="433" text-anchor="middle" class="tiny">multipart file</text>
<path class="dashed" d="M540 535 L770 375"/><text x="655" y="450" text-anchor="middle" class="tiny">file path/url</text>
<path class="line" d="M1070 585 L1160 585"/><text x="1115" y="580" text-anchor="middle" class="tiny">create payment</text>
<path class="dashed" d="M1160 650 L1040 420"/><text x="1100" y="530" text-anchor="middle" class="tiny">callback</text>
<path class="dashed" d="M920 535 L565 340"/><text x="743" y="433" text-anchor="middle" class="tiny">image URL</text>
<path class="dashed" d="M565 340 L250 300"/><text x="408" y="315" text-anchor="middle" class="tiny">render UI</text>
<rect class="note" x="70" y="760" width="1370" height="90" rx="6"/>
<text x="92" y="790" class="small">Ghi chú triển khai</text>
<text x="92" y="818" class="tiny">- Frontend và backend có thể chạy local khi phát triển hoặc tách thành 2 service khi deploy.</text>
<text x="92" y="840" class="tiny">- Backend dùng biến môi trường để cấu hình MongoDB, JWT, Cloudinary và VNPay.</text>
</svg>
