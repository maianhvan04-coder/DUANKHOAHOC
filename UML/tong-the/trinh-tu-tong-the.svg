<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="900" viewBox="0 0 1460 900">
  <title>Sơ đồ trình tự tổng thể toàn hệ thống</title>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#111"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #111; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 14px; }
      .small { font-size: 12px; }
      .tiny { font-size: 10px; }
      .boundary { fill: #fff; stroke: #111; stroke-width: 1.5; }
      .usecase { fill: #fff; stroke: #111; stroke-width: 1.3; }
      .actor { stroke: #111; stroke-width: 1.25; fill: none; }
      .line { stroke: #111; stroke-width: 1.15; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #111; stroke-width: 1; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
      .box { fill: #fff; stroke: #111; stroke-width: 1.25; }
      .soft { fill: #f7f7f7; stroke: #111; stroke-width: 1.1; }
      .decision { fill: #fff; stroke: #111; stroke-width: 1.25; }
      .class { fill: #fff; stroke: #111; stroke-width: 1.2; }
      .classHead { fill: #efefef; stroke: #111; stroke-width: 1.2; }
      .relation { stroke: #111; stroke-width: 1; fill: none; }
      .participant { fill: #fff; stroke: #111; stroke-width: 1.2; }
      .lifeline { stroke: #888; stroke-width: 1; stroke-dasharray: 6 5; }
      .note { fill: #fffbe6; stroke: #111; stroke-width: 1; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="730" y="34" text-anchor="middle" class="title">Sơ đồ trình tự tổng thể toàn hệ thống</text>
<rect class="participant" x="8" y="82" width="144" height="40" rx="6"/>
<text x="80" y="109" text-anchor="middle" class="tiny"><tspan x="80" y="109">Actor</tspan></text>
<line class="lifeline" x1="80" y1="122" x2="80" y2="835"/>
<rect class="participant" x="193" y="82" width="144" height="40" rx="6"/>
<text x="265" y="109" text-anchor="middle" class="tiny"><tspan x="265" y="109">Frontend</tspan></text>
<line class="lifeline" x1="265" y1="122" x2="265" y2="835"/>
<rect class="participant" x="378" y="82" width="144" height="40" rx="6"/>
<text x="450" y="109" text-anchor="middle" class="tiny"><tspan x="450" y="109">Auth/RBAC</tspan></text>
<line class="lifeline" x1="450" y1="122" x2="450" y2="835"/>
<rect class="participant" x="563" y="82" width="144" height="40" rx="6"/>
<text x="635" y="109" text-anchor="middle" class="tiny"><tspan x="635" y="109">API Controller</tspan></text>
<line class="lifeline" x1="635" y1="122" x2="635" y2="835"/>
<rect class="participant" x="748" y="82" width="144" height="40" rx="6"/>
<text x="820" y="109" text-anchor="middle" class="tiny"><tspan x="820" y="109">Domain Service</tspan></text>
<line class="lifeline" x1="820" y1="122" x2="820" y2="835"/>
<rect class="participant" x="933" y="82" width="144" height="40" rx="6"/>
<text x="1005" y="109" text-anchor="middle" class="tiny"><tspan x="1005" y="109">Repository/Model</tspan></text>
<line class="lifeline" x1="1005" y1="122" x2="1005" y2="835"/>
<rect class="participant" x="1118" y="82" width="144" height="40" rx="6"/>
<text x="1190" y="109" text-anchor="middle" class="tiny"><tspan x="1190" y="109">MongoDB</tspan></text>
<line class="lifeline" x1="1190" y1="122" x2="1190" y2="835"/>
<rect class="participant" x="1303" y="82" width="144" height="40" rx="6"/>
<text x="1375" y="109" text-anchor="middle" class="tiny"><tspan x="1375" y="109">External</tspan></text>
<line class="lifeline" x1="1375" y1="122" x2="1375" y2="835"/>
<path class="line" d="M80 160 L265 160"/><text x="173" y="155" text-anchor="middle" class="tiny">1. Chọn một trong 23 UC / nhập dữ liệu</text>
<path class="line" d="M265 199 L450 199"/><text x="358" y="194" text-anchor="middle" class="tiny">2. Gửi token hoặc yêu cầu xác thực</text>
<path class="line" d="M450 238 L1005 238"/><text x="728" y="233" text-anchor="middle" class="tiny">3. Kiểm tra user, role, permission</text>
<path class="line" d="M1005 277 L1190 277"/><text x="1098" y="272" text-anchor="middle" class="tiny">4. Truy vấn dữ liệu xác thực</text>
<path class="dashed" d="M1190 316 L450 316"/><text x="820" y="311" text-anchor="middle" class="tiny">5. Trả thông tin quyền</text>
<path class="line" d="M265 355 L635 355"/><text x="450" y="350" text-anchor="middle" class="tiny">6. Gửi request nghiệp vụ</text>
<path class="line" d="M635 394 L450 394"/><text x="543" y="389" text-anchor="middle" class="tiny">7. Authorize theo endpoint</text>
<path class="line" d="M635 433 L820 433"/><text x="728" y="428" text-anchor="middle" class="tiny">8. Validate và điều phối nghiệp vụ</text>
<path class="line" d="M820 472 L1005 472"/><text x="913" y="467" text-anchor="middle" class="tiny">9. Đọc/ghi entity nghiệp vụ</text>
<path class="line" d="M1005 511 L1190 511"/><text x="1098" y="506" text-anchor="middle" class="tiny">10. CRUD dữ liệu</text>
<path class="line" d="M820 550 L1375 550"/><text x="1098" y="545" text-anchor="middle" class="tiny">11. Gọi VNPay nếu cần</text>
<path class="dashed" d="M1375 589 L820 589"/><text x="1098" y="584" text-anchor="middle" class="tiny">12. Trả kết quả dịch vụ ngoài</text>
<path class="dashed" d="M1190 628 L1005 628"/><text x="1098" y="623" text-anchor="middle" class="tiny">13. Trả dữ liệu</text>
<path class="dashed" d="M1005 667 L820 667"/><text x="913" y="662" text-anchor="middle" class="tiny">14. Trả entity/result</text>
<path class="dashed" d="M820 706 L635 706"/><text x="728" y="701" text-anchor="middle" class="tiny">15. Trả response nghiệp vụ</text>
<path class="dashed" d="M635 745 L265 745"/><text x="450" y="740" text-anchor="middle" class="tiny">16. HTTP response</text>
<path class="dashed" d="M265 784 L80 784"/><text x="173" y="779" text-anchor="middle" class="tiny">17. Hiển thị kết quả / lỗi</text>
</svg>
