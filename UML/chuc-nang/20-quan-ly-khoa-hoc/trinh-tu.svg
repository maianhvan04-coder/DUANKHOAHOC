<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="720" viewBox="0 0 1320 720">
  <title>Trình tự - UC20. Quản lý khóa học</title>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#111"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #111; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 14px; }
      .small { font-size: 12px; }
      .tiny { font-size: 10px; }
      .boundary { fill: #fff; stroke: #111; stroke-width: 1.5; }
      .usecase { fill: #fff; stroke: #111; stroke-width: 1.3; }
      .actor { stroke: #111; stroke-width: 1.25; fill: none; }
      .line { stroke: #111; stroke-width: 1.15; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #111; stroke-width: 1; stroke-dasharray: 5 4; fill: none; marker-end: url(#arrow); }
      .box { fill: #fff; stroke: #111; stroke-width: 1.25; }
      .soft { fill: #f7f7f7; stroke: #111; stroke-width: 1.1; }
      .decision { fill: #fff; stroke: #111; stroke-width: 1.25; }
      .class { fill: #fff; stroke: #111; stroke-width: 1.2; }
      .classHead { fill: #efefef; stroke: #111; stroke-width: 1.2; }
      .relation { stroke: #111; stroke-width: 1; fill: none; }
      .participant { fill: #fff; stroke: #111; stroke-width: 1.2; }
      .lifeline { stroke: #888; stroke-width: 1; stroke-dasharray: 6 5; }
      .note { fill: #fffbe6; stroke: #111; stroke-width: 1; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="660" y="34" text-anchor="middle" class="title">Trình tự - UC20. Quản lý khóa học</text>
<rect class="participant" x="6" y="82" width="148" height="38" rx="6"/>
<text x="80" y="108" text-anchor="middle" class="tiny"><tspan x="80" y="108">Quản lý/Admin</tspan></text>
<line class="lifeline" x1="80" y1="120" x2="80" y2="660"/>
<rect class="participant" x="238" y="82" width="148" height="38" rx="6"/>
<text x="312" y="108" text-anchor="middle" class="tiny"><tspan x="312" y="108">Frontend</tspan></text>
<line class="lifeline" x1="312" y1="120" x2="312" y2="660"/>
<rect class="participant" x="470" y="82" width="148" height="38" rx="6"/>
<text x="544" y="108" text-anchor="middle" class="tiny"><tspan x="544" y="108">CourseController</tspan></text>
<line class="lifeline" x1="544" y1="120" x2="544" y2="660"/>
<rect class="participant" x="702" y="82" width="148" height="38" rx="6"/>
<text x="776" y="108" text-anchor="middle" class="tiny"><tspan x="776" y="108">CourseService</tspan></text>
<line class="lifeline" x1="776" y1="120" x2="776" y2="660"/>
<rect class="participant" x="934" y="82" width="148" height="38" rx="6"/>
<text x="1008" y="108" text-anchor="middle" class="tiny"><tspan x="1008" y="108">CourseRepo</tspan></text>
<line class="lifeline" x1="1008" y1="120" x2="1008" y2="660"/>
<rect class="participant" x="1166" y="82" width="148" height="38" rx="6"/>
<text x="1240" y="108" text-anchor="middle" class="tiny"><tspan x="1240" y="108">MongoDB</tspan></text>
<line class="lifeline" x1="1240" y1="120" x2="1240" y2="660"/>
<path class="line" d="M80 155 L312 155"/><text x="196" y="150" text-anchor="middle" class="tiny">1. Chọn chức năng / nhập dữ liệu</text>
<path class="line" d="M312 210 L544 210"/><text x="428" y="205" text-anchor="middle" class="tiny">2. Gửi HTTP request</text>
<path class="line" d="M544 265 L776 265"/><text x="660" y="260" text-anchor="middle" class="tiny">3. Validate và điều phối</text>
<path class="line" d="M776 320 L1008 320"/><text x="892" y="315" text-anchor="middle" class="tiny">4. Kiểm tra quyền/dữ liệu</text>
<path class="line" d="M1008 375 L1240 375"/><text x="1124" y="370" text-anchor="middle" class="tiny">5. Truy vấn hoặc cập nhật</text>
<path class="dashed" d="M1240 430 L776 430"/><text x="1008" y="425" text-anchor="middle" class="tiny">6. Trả kết quả</text>
<path class="dashed" d="M776 485 L544 485"/><text x="660" y="480" text-anchor="middle" class="tiny">7. Trả dữ liệu xử lý</text>
<path class="dashed" d="M544 540 L312 540"/><text x="428" y="535" text-anchor="middle" class="tiny">8. HTTP response</text>
<path class="dashed" d="M312 595 L80 595"/><text x="196" y="590" text-anchor="middle" class="tiny">9. Hiển thị kết quả</text>
</svg>
